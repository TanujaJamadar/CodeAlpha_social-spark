<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Sign in · Pulse</title>
  <link rel="stylesheet" href="css/styles.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
</head>
<body>
  <header id="nav"></header>
  <main class="auth-wrap">
    <div class="card auth-card">
      <h1>Welcome back</h1>
      <p class="sub">Sign in to continue to Pulse.</p>
      <form id="loginForm" novalidate>
        <div class="form-group">
          <label for="email">Email</label>
          <input id="email" name="email" type="email" required autocomplete="email">
        </div>
        <div class="form-group">
          <label for="password">Password</label>
          <input id="password" name="password" type="password" required autocomplete="current-password">
        </div>
        <button type="submit" class="btn btn-primary btn-block">Sign in</button>
      </form>
      <p style="text-align:center; margin-top:16px; color:var(--text-muted)">
        New here? <a href="register.html" style="color:var(--primary)">Create an account</a>
      </p>
    </div>
  </main>
  <script src="js/api.js"></script>
  <script src="js/ui.js"></script>
  <script src="js/auth.js"></script>
  <script>
    if (!window.__authJsLoaded || !window.__authLoginAttached) {
      const loginForm = document.getElementById('loginForm');
      if (loginForm && !window.__authLoginAttached) {
        window.__authLoginAttached = true;
        loginForm.addEventListener('submit', async (e) => {
          e.preventDefault();
          const fd = new FormData(loginForm);
          const email = (fd.get('email') || '').toString().trim();
          const password = (fd.get('password') || '').toString();
          if (!email || !password) {
            const errorEl = loginForm.querySelector('.form-error.global') || document.createElement('div');
            errorEl.className = 'form-error global';
            if (!loginForm.querySelector('.form-error.global')) loginForm.prepend(errorEl);
            errorEl.textContent = 'Email and password required';
            return;
          }
          const btn = loginForm.querySelector('button[type=submit]');
          btn.disabled = true;
          btn.innerHTML = '<span class="loader"></span> Signing in...';
          try {
            const response = await fetch('http://localhost:5000/api/auth/login', {
              method: 'POST',
              headers: { 'Content-Type': 'application/json' },
              body: JSON.stringify({ email, password }),
            });
            const data = await response.json();
            if (!response.ok) throw new Error(data.message || 'Login failed');
            localStorage.setItem('token', data.token);
            localStorage.setItem('user', JSON.stringify(data.user));
            window.location.href = 'dashboard.html';
          } catch (err) {
            const errorEl = loginForm.querySelector('.form-error.global') || document.createElement('div');
            errorEl.className = 'form-error global';
            if (!loginForm.querySelector('.form-error.global')) loginForm.prepend(errorEl);
            errorEl.textContent = err.message;
          } finally {
            btn.disabled = false;
            btn.textContent = 'Sign in';
          }
        });
      }
    }
  </script>
</body>
</html>

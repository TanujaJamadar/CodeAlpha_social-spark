<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Edit profile · Pulse</title>
  <link rel="stylesheet" href="css/styles.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
</head>
<body>
  <header id="nav"></header>
  <main class="container-narrow">
    <h1 style="margin: 24px 0 16px">Edit profile</h1>
    <div class="card">
      <div id="current-avatar" style="text-align:center; margin-bottom:16px"></div>
      <form id="edit-profile-form">
        <div class="form-group">
          <label for="avatar">Profile picture</label>
          <input id="avatar" name="avatar" type="file" accept="image/*">
        </div>
        <div class="form-group">
          <label for="name">Display name</label>
          <input id="name" name="name" type="text" maxlength="60">
        </div>
        <div class="form-group">
          <label for="bio">Bio <span style="color:var(--text-muted); font-weight:400">(max 250 chars)</span></label>
          <textarea id="bio" name="bio" maxlength="250"></textarea>
        </div>
        <button type="submit" class="btn btn-primary">Save changes</button>
      </form>
    </div>
  </main>
  <script src="js/api.js"></script>
  <script src="js/ui.js"></script>
  <script src="js/posts.js"></script>
  <script src="js/profile.js"></script>
</body>
</html>

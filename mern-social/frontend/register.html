<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Create your account · Pulse</title>
  <link rel="stylesheet" href="css/styles.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
</head>
<body>
  <header id="nav"></header>
  <main class="auth-wrap">
    <div class="card auth-card">
      <h1>Create your account</h1>
      <p class="sub">Join Pulse and start sharing today.</p>
      <form id="registerForm" novalidate>
        <div class="form-group">
          <label for="username">Username</label>
          <input id="username" name="username" type="text" required minlength="3" maxlength="30" pattern="[A-Za-z0-9_.]+" autocomplete="username" aria-describedby="usernameHelp">
          <p id="usernameHelp" class="form-hint">3-30 characters. Letters, numbers, underscore, and dot only.</p>
        </div>
        <div class="form-group">
          <label for="email">Email</label>
          <input id="email" name="email" type="email" required autocomplete="email" aria-describedby="emailHelp">
          <p id="emailHelp" class="form-hint">Use a valid email address. You will sign in with this email.</p>
        </div>
        <div class="form-group">
          <label for="password">Password</label>
          <input id="password" name="password" type="password" required minlength="6" autocomplete="new-password" aria-describedby="passwordHelp">
          <p id="passwordHelp" class="form-hint">At least 6 characters.</p>
        </div>
        <button type="submit" class="btn btn-primary btn-block">Create account</button>
      </form>
      <p style="text-align:center; margin-top:16px; color:var(--text-muted)">
        Already have an account? <a href="login.html" style="color:var(--primary)">Sign in</a>
      </p>
    </div>
  </main>
  <script src="js/api.js"></script>
  <script src="js/ui.js"></script>
  <script src="js/auth.js"></script>
</body>
</html>
